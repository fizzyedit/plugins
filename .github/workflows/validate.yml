name: Validate registry

# Runs on PRs that add or change a registry entry. Validates every registry/<id>.json (a
# malformed entry — bad JSON, missing keys, id≠filename — fails the check) and attempts to
# fetch the referenced manifests, reporting any that are unreachable as warnings (network is
# flaky, so manifest reachability does not fail the build). Does not write index.json.
on:
  pull_request:
    paths:
      - "registry/**"
      - "scripts/aggregate.py"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate registry entries + manifests
        run: python3 scripts/aggregate.py --check
