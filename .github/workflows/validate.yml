name: Validate registry

# Runs on PRs that add or change a registry entry. Validates every registry/<id>.json (a
# malformed entry — bad JSON, missing keys, id≠filename — fails the check) and attempts to
# fetch the referenced manifests, reporting any that are unreachable as warnings (network is
# flaky and manifest hosting is the author's, so reachability does not fail the build).
# Never touches registry.db and writes nothing.
on:
  pull_request:
    paths:
      - "registry/**"
      - "store/**"

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Pinned so the workaround below targets a known path. Works around a Zig 0.16.0 bug where
      # `zig fetch` fails on zip dependencies (e.g. zig-sqlite's sqlite-amalgamation-*.zip) with
      # "failed to create temporary zip file: FileNotFound" when the global cache's tmp/ dir
      # doesn't exist yet (fresh runner). See https://codeberg.org/ziglang/zig/issues/35264.
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Work around zig fetch zip bug (codeberg.org/ziglang/zig#35264)
        run: mkdir -p "$ZIG_GLOBAL_CACHE_DIR/tmp"

      - name: Run store unit tests
        working-directory: store
        run: zig build test

      - name: Validate registry entries + manifests
        working-directory: store
        run: zig build run -- validate --root ..
